name: Node.js CI (Login Web App)

on:
  push:
    paths:
      - 'ui-kit/src/login-web-app/**'
  pull_request:
    paths:
      - 'ui-kit/src/login-web-app/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        # This matches the folder highlighted in your screenshot
        working-directory: ui-kit/src/login-web-app

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        # Crucial: path to the nested lockfile
        cache-dependency-path: ui-kit/src/login-web-app/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Prettier Check
      run: npm run prettier-check

    - name: Lint Code
      run: npm run lint

    - name: Build Project
      run: npm run build

    - name: Run Tests
      run: npm test
