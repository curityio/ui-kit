name: Node.js CI (LWA Subfolder)

on:
  push:
    paths:
      - 'uikit/lwa/**' # Only trigger if files in this folder change
  pull_request:
    paths:
      - 'uikit/lwa/**' # Only trigger if the PR touches this folder

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # This ensures all 'run' commands happen inside the subfolder
    defaults:
      run:
        working-directory: uikit/lwa

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive 

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        # Tells the cacher where to find the lockfile
        cache-dependency-path: uikit/lwa/package-lock.json

    - name: Install Dependencies
      run: npm ci

    - name: Lint Code
      run: npm run lint

    - name: Build Project
      run: npm run build

    - name: Run Tests
      run: npm test
