name: LWA Node.js CI

on:
  push:
    # Runs on any branch push
  pull_request:
    # Triggers for PRs targeting any branch
  workflow_dispatch: 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Crucial because LWA is a submodule
        submodules: recursive 

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        # Match your "engines" field exactly
        node-version: '22'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Prettier Check
      # Uses your specific "prettier-check" script
      run: npm run prettier-check

    - name: Lint Code
      # Uses your eslint configuration
      run: npm run lint

    - name: Build Project
      # Uses "tsc -b && vite build" as defined in your package.json
      run: npm run build

    - name: Run Tests
      # Uses vitest as defined in your package.json
      run: npm test
