name: Node.js CI (Login Web App)

steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js from .nvmrc
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Prettier Check
      run: npx prettier --check src/login-web-app

    - name: Lint Code
      run: npm run lint -w src/login-web-app

    - name: Build Project
      run: npm run build:login-web-app

    - name: Run Tests
      run: npm test -w src/login-web-app
